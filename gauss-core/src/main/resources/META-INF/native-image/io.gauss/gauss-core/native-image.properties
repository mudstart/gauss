# GraalVM native-image configuration for gauss-core (HU-047)
#
# Ensures that Gauss core annotations and the ServiceLoader-based
# RuntimeAdapter SPI are correctly included in native image builds.
#
# Quarkus processes these automatically when gauss-core is on the
# compile classpath; for plain GraalVM builds use:
#   native-image -H:ConfigurationFileDirectories=<path-to-this-dir>

Args=--initialize-at-build-time=io.gauss.core.config.GaussRuntime \
     -H:+AllowIncompleteClasspath
